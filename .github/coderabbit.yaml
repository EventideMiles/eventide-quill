# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
reviews:
    profile: chill
    request_changes_workflow: false
    high_level_summary: true
    poem: false
    review_status: true
    collapse_walkthrough: false
    auto_review:
        enabled: true
        drafts: false
        base_branches:
            - main
            - develop
    tools:
        # Checkov is an infrastructure-as-code scanner (Terraform, K8s,
        # Docker, CloudFormation). This repo is an Obsidian TypeScript plugin
        # with no IaC files, so the tool is irrelevant here — and CodeRabbit's
        # runtime currently ships a broken install (ModuleNotFoundError: No
        # module named 'checkov'), which surfaces as a warning on every review.
        checkov:
            enabled: false
